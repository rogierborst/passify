<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      @font-face {
        font-family: 'Dela Gothic One';
        src: url('./DelaGothicOne-Regular.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
      }
    </style>
    <clipPath id="clip">
